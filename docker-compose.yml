version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task-manager-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/task_manager_db?sslmode=disable
      - DB_CONNECTION=postgresql://postgres:password@db:5432/task_manager_db?sslmode=disable
      - JWT_SECRET=my-super-secret-access-token-key-for-task-manager-app-123!
      - JWT_REFRESH_SECRET=my-super-secret-refresh-token-key-for-task-manager-app-123!
      - PORT=3001
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    container_name: task-manager-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
